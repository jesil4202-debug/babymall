<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Your Baby Mall Login Code</title>
  <style>
    body {font-family: Arial, Helvetica, sans-serif; background:#f9fafb; margin:0; padding:0;}
    .container {max-width:600px; margin:40px auto; background:#fff; padding:30px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.08);}
    .logo {display:block; margin:0 auto 20px; width:120px;}
    .code {font-size:2rem; font-weight:600; letter-spacing:4px; background:#f0f4ff; padding:10px 20px; border-radius:6px; text-align:center; margin:20px 0;}
    .footer {font-size:0.85rem; color:#777; text-align:center; margin-top:30px;}
  </style>
</head>
<body>
  <div class="container">
    <img src="https://example.com/logo.png" alt="Baby Mall" class="logo" />
    <h2>Hello,</h2>
    <p>Use the following one‑time code to sign in to <strong>Baby Mall</strong>. It expires in <strong>5 minutes</strong> and can be used only once.</p>
    <div class="code">{{OTP}}</div>
    <p>If you didn’t request this code, you can safely ignore this email.</p>
    <div class="footer">© 2026 Baby Mall. All rights reserved.</div>
  </div>
</body>
</html>
